services:
  step-ca:
    image: smallstep/step-ca
    ports:
      - "9000:9000"
    volumes:
      - step_ca_data:/home/step
    environment:
      - DOCKER_STEPCA_INIT_NAME=${CA_NAME}
      - DOCKER_STEPCA_INIT_DNS_NAMES=${CA_DNS_NAMES}
      - DOCKER_STEPCA_INIT_ADDRESS=:9000
      - DOCKER_STEPCA_INIT_ACME=true
      - DOCKER_STEPCA_INIT_PASSWORD_FILE=/run/secrets/password
    secrets:
      - source: root_ca_crt
        target: root_ca.crt
      - source: root_ca_key
        target: root_ca_key
      - source: ca_password
        target: password
    healthcheck:
      test: ["CMD-SHELL", "curl -sfk https://localhost:9000/health | grep ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  traefik:
    image: traefik:v3.6.9
    depends_on:
      step-ca:
        condition: service_healthy
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.stepca.acme.caserver=https://step-ca:9000/acme/acme/directory"
      - "--certificatesresolvers.stepca.acme.email=${ADMIN_EMAIL}"
      - "--certificatesresolvers.stepca.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.stepca.acme.httpchallenge.entrypoint=web"
    labels:
      - "traefik.enable=true"
      # Redirect middleware: HTTP → HTTPS (used by other services, not ca-cert)
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"
      # Catch-all HTTP→HTTPS redirect (lowest priority, ca-cert overrides it)
      - "traefik.http.routers.http-catchall.rule=HostRegexp(`.+`)"
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.middlewares=https-redirect"
      - "traefik.http.routers.http-catchall.priority=1"
    environment:
      - LEGO_CA_CERTIFICATES=/certs/root_ca.crt
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme
      - ./pki/root_ca.crt:/certs/root_ca.crt:ro
    restart: unless-stopped

  certwarden:
    image: ghcr.io/gregtwallace/certwarden:latest
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache ca-certificates >/dev/null 2>&1; update-ca-certificates >/dev/null 2>&1; exec /app/certwarden"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.certwarden.rule=Host(`${PKI_DOMAIN}`) && PathPrefix(`/certwarden`)"
      - "traefik.http.routers.certwarden.entrypoints=websecure"
      - "traefik.http.routers.certwarden.tls.certresolver=stepca"
      - "traefik.http.services.certwarden.loadbalancer.server.port=4050"
    volumes:
      - certwarden_data:/opt/certwarden/data
      - ./config/certwarden.yaml:/opt/certwarden/config/certwarden.yaml:ro
      - ./pki/root_ca.crt:/usr/local/share/ca-certificates/root_ca.crt:ro
    restart: unless-stopped

  ca-cert:
    image: busybox:latest
    command: ["httpd", "-f", "-p", "80", "-h", "/www"]
    labels:
      - "traefik.enable=true"
      # HTTP (plain — for bootstrapping trust on new machines)
      - "traefik.http.routers.ca-cert.rule=Path(`/cert/ca.crt`)"
      - "traefik.http.routers.ca-cert.entrypoints=web"
      - "traefik.http.routers.ca-cert.priority=100"
      # HTTPS
      - "traefik.http.routers.ca-cert-secure.rule=Path(`/cert/ca.crt`)"
      - "traefik.http.routers.ca-cert-secure.entrypoints=websecure"
      - "traefik.http.routers.ca-cert-secure.tls.certresolver=stepca"
      - "traefik.http.routers.ca-cert-secure.priority=100"
      - "traefik.http.services.ca-cert.loadbalancer.server.port=80"
    volumes:
      - ./pki/root_ca.crt:/www/cert/ca.crt:ro
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime.rule=Host(`${PKI_DOMAIN}`) && PathPrefix(`/`)"
      - "traefik.http.routers.uptime.entrypoints=websecure"
      - "traefik.http.routers.uptime.tls.certresolver=stepca"
      - "traefik.http.routers.uptime.priority=1"
      - "traefik.http.services.uptime.loadbalancer.server.port=3001"
    volumes:
      - uptime_kuma_data:/app/data
    restart: unless-stopped

secrets:
  root_ca_crt:
    file: ./pki/root_ca.crt
  root_ca_key:
    file: ./pki/root_ca.key
  ca_password:
    file: ./pki/password.txt

volumes:
  step_ca_data:
  traefik_acme:
  certwarden_data:
  uptime_kuma_data:
